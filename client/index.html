<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Metaverse MVP</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        overflow: hidden;
        font-family: sans-serif;
      }

      #canvas-container {
        width: 100vw;
        height: 100vh;
      }

      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.75);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        z-index: 100;
      }

      #overlay h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        letter-spacing: 0.1em;
      }

      #overlay p {
        font-size: 1rem;
        color: #aaa;
        margin-bottom: 2rem;
        text-align: center;
        padding: 0 1rem;
      }

      #enter-btn {
        padding: 0.75rem 2.5rem;
        font-size: 1.1rem;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }

      #enter-btn:hover {
        background: #4338ca;
      }

      #hud {
        position: fixed;
        top: 1rem;
        left: 1rem;
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.75rem;
        pointer-events: none;
        z-index: 10;
      }

      #joystick-zone {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 200px;
        height: 200px;
        z-index: 20;
        touch-action: none;
      }

      #jump-btn {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: rgba(79, 70, 229, 0.7);
        color: #fff;
        font-size: 1.5rem;
        border: 2px solid rgba(255, 255, 255, 0.3);
        cursor: pointer;
        z-index: 20;
        touch-action: none;
        display: none;
      }

      #camera-area {
        position: fixed;
        top: 0;
        right: 0;
        width: calc(100% - 200px);
        height: 100%;
        z-index: 15;
        touch-action: none;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>

    <div id="overlay">
      <h1>Metaverse MVP</h1>
      <p>PC: クリックでPointerLock → WASD移動 / マウスで視点変更<br />スマホ: タップで開始 → ジョイスティックで移動</p>
      <button id="enter-btn">Enter</button>
    </div>

    <div id="hud">WASD: 移動 | Space: ジャンプ | ESC: 解放</div>
    <div id="joystick-zone"></div>
    <button id="jump-btn">↑</button>
    <div id="camera-area"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
